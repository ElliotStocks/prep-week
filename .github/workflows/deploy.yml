# Builds and publishes the app to GitHub Pages on every change, and every night
# (03:30 UTC) refreshes all Ocado prices first so the live app never goes stale.
name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Refresh supermarket prices (nightly runs only)
        if: github.event_name != 'push'
        run: |
          # Each supermarket refreshes independently; a blocked run warns instead of
          # aborting the job (the fetch scripts already refuse to save collapsed data).
          npm run ocado || echo "::warning::Ocado refresh failed (likely bot-blocked) — keeping existing snapshot"
          npm run aldi || echo "::warning::Aldi refresh failed — keeping existing snapshot"
          if ! git diff --quiet src/ocado-products.js src/aldi-products.js; then
            git config user.name "prep-week bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/ocado-products.js src/aldi-products.js
            git commit -m "Nightly supermarket price refresh"
            git push
          fi

      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
